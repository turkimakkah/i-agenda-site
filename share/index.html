<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Checklist</title>
    <meta property="og:title" content="Agenda - Checklist">
    <meta property="og:description" content="افتح قائمة الفحص في تطبيق Agenda">
    <meta property="og:type" content="website">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { text-align: center; padding: 40px 20px; }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            background: white;
            color: #764ba2;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>جاري فتح التطبيق...</h1>
        <p>إذا لم يفتح التطبيق تلقائياً، اضغط الزر أدناه</p>
        <a class="btn" href="https://apps.apple.com/sa/app/agenda-tasks-reminders/id6759724584">
            تحميل من App Store
        </a>
    </div>
    <script>
        var params = window.location.search;
        var agendaURL = "agenda://checklist" + params;
        setTimeout(function() { window.location.href = agendaURL; }, 100);
        setTimeout(function() {
            window.location.href = "https://apps.apple.com/sa/app/agenda-tasks-reminders/id6759724584";
        }, 2000);
    </script>
</body>
</html>
